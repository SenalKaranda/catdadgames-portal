slug: think-backwards
title: Think Backwards
tagline: A Jeopardy-inspired hotseat trivia game for groups.
description: |
  Think Backwards is a trivia game in the spirit of Jeopardy — you see the
  answer, and your job is to come up with the question. Players take turns at
  one shared device, so it's a great fit for living rooms, classrooms, and
  community spaces where one screen is easier than asking everyone to bring a
  phone.

  No accounts, no installs. Open the game in a browser and play.
url: https://thinkbackwards.app
launch_target: new_tab

# Thumbnail: drop a 1200x675 WebP at ./thumbnails/think-backwards.webp and

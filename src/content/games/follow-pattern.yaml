slug: follow-pattern
title: Follow Directions
tagline: Watch. Remember. Repeat.
description: |
  Follow Directions is a single-player memory game in the spirit of the
  classic light-up sequence toys. Watch the pads light up, then tap them
  back in the same order. The pattern grows each round — see how far your
  memory can take you. Four modes (Classic, Speed Run, Reverse, Endless)
  vary the lives, timer, and playback speed for a different challenge each
  time.

